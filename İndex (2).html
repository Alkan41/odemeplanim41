              sn = snMatch[1].trim().toLocaleUpperCase('tr-TR');
              text = text.replace(snMatch[0], "").trim();
            }

            let qty = 0;
            const qtyRegex = /(\d+)\s*ADET/i;
            const qtyMatch = text.match(qtyRegex);
            if (qtyMatch) {
                qty = parseInt(qtyMatch[1]);
                text = text.replace(qtyMatch[0], "").trim();
            } else {
                const endQtyMatch = text.match(/(\d+)$/);
                if (endQtyMatch) {
                    qty = parseInt(endQtyMatch[1]);
                    text = text.replace(/(\d+)$/, "").trim();
                }
            }

            let name = text.replace(/\s+/g, " ").trim();
            if (name || pn || sn) {
                results.push({ name: name || "İsimsiz", partNo: pn, serialNo: sn, requested: qty });
            }
        });
        setProcessedChecklist(processItems(results));
        setChecklistInput('');
      };

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!formData.title || !formData.ebysNumber || !formData.ebysDate || formData.requestingUnits.length === 0) {
            if (formData.requestingUnits.length === 0) alert('Lütfen en az bir talep eden birim seçin.');
            return;
        }

        if (checklistInput.trim() && processedChecklist.length === 0) {
          return alert("Lütfen yapıştırılan veriyi AKTAR butonuna basarak checklist'e dönüştürün.");
        }

        let finalChecklistItems = [...processedChecklist];
        manualChecklistItems.forEach(item => {
            if (item.name.trim()) {
                finalChecklistItems.push(item);
            }
        });

        const checklistProgressItems = finalChecklistItems.map(item => ({
            date: new Date().toISOString(),
            description: `${item.name.toLocaleUpperCase('tr-TR')} | Talep: ${item.requested} | Gelen: 0 | Kalan: ${item.requested} | PN:${(item.partNo || '').toLocaleUpperCase('tr-TR')} | SN:${(item.serialNo || '').toLocaleUpperCase('tr-TR')} | H: | A:${formData.assignedToUnits.length === 1 ? formData.assignedToUnits[0] : ''}`,
            isKalanIsler: true
        }));

        onSave({ 
            ...(demandToEdit && { id: demandToEdit.id }), 
            ...formData, 
            requestingUnit: formData.requestingUnits.join(','), 
            assignedTo: formData.assignedToUnits.join(','),
            checklistItems: checklistProgressItems 
        }, transferToMaterialList && !demandToEdit);

        if (transferToMaterialList && !demandToEdit) {
            setShowMaterialTable(true);
        }
      };
      
      if (!isOpen) return null;

      return (
        <div className="fixed inset-0 bg-black bg-opacity-50 z-50 flex justify-center items-center p-4 backdrop-blur-sm pointer-events-auto" onWheel={e=>e.stopPropagation()}>
          <div className="bg-white rounded-lg shadow-xl w-full modal-container-wide p-8 font-serif relative" onClick={(e) => e.stopPropagation()}>
            <div className="flex justify-between mb-6 border-b pb-4">
                <h2 className="text-2xl font-semibold text-black uppercase font-black tracking-widest">{showMaterialTable ? 'Gelen Malzeme Listesi' : (demandToEdit ? 'Düzenle' : 'Yeni Kayıt')}</h2>
                <button onClick={onClose} className="p-1 rounded-full hover:bg-gray-100 text-gray-400"><Icons.X className="w-6 h-6 text-gray-600"/></button>
            </div>
            {showMaterialTable ? (
                <div className="w-full h-[60vh] bg-white rounded-lg overflow-hidden border border-gray-200">
                    <iframe 
                        src="https://docs.google.com/spreadsheets/d/1L05588TdYZmH401Lvn4_yr4zwiw2pW4EJ8dIyl-UTVQ/edit?hl=tr&gid=0#gid=0" 
                        className="w-full h-full border-none"
                        title="Gelen Malzeme Listesi"
                    />
                </div>
            ) : (
            <form onSubmit={handleSubmit} className="space-y-6 max-h-[80vh] overflow-y-auto pr-2">
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="space-y-2">
                       <label className="text-sm font-black text-black uppercase tracking-widest">Talep Başlığı</label>
                       <input type="text" placeholder="Başlık" value={formData.title} onChange={handleTitleChange} className="w-full border p-3 rounded text-black focus:ring-blue-500 focus:border-blue-500 uppercase font-black tracking-tighter" required/>
                    </div>
                    <div className="space-y-2">
                       <label className="text-sm font-black text-black uppercase tracking-widest">İşi Alan Kurum / Kişi</label>
                       <div className="flex flex-col gap-2">
                            <div className="flex flex-wrap gap-2 p-2 border rounded min-h-[50px] bg-gray-50 shadow-inner">
                                {formData.assignedToUnits.map(u=><span key={u} className="bg-green-100 text-green-800 text-xs px-2 py-1 rounded-full flex items-center gap-2 uppercase font-black">{u} <button type="button" onClick={()=>handleRemoveAssignedUnit(u)} className="hover:text-red-500 transition-colors"><Icons.XCircle className="w-4 h-4"/></button></span>)}
                                {formData.assignedToUnits.length === 0 && <span className="text-xs text-gray-400 italic">Ekleme yapınız...</span>}
                            </div>
                            <div className="flex gap-2">
                                <input 
                                    list="storedNamesList" 
                                    type="text" 
                                    placeholder="Firma veya Kişi Adı" 
                                    value={formData.assignedUnitToAdd} 
                                    onChange={handleAssignedUnitToAddChange} 
                                    className="flex-grow border p-2 rounded text-black focus:ring-blue-500 focus:border-blue-500 uppercase font-black tracking-tighter" 
                                />
                                <datalist id="storedNamesList">
                                    {(storedAssignedNames || []).map(name => <option key={name} value={name} />)}
                                </datalist>
                                <button type="button" onClick={handleAddAssignedUnit} className="bg-green-600 text-white px-4 py-2 rounded text-xs font-black uppercase shadow-md hover:bg-green-700">Ekle</button>
                            </div>
                            <label className="flex items-center gap-2 text-xs font-black text-black uppercase cursor-pointer select-none mt-1">
                                <input type="checkbox" checked={formData.addAssignedToList} onChange={e => setFormData({...formData, addAssignedToList: e.target.checked})} className="rounded text-blue-600" />
                                Kalıcı Listeye Kaydet
                            </label>
                       </div>
                    </div>
                </div>
                
                <div className="grid grid-cols-2 gap-6">
                   <div className="space-y-2">
                      <label className="text-sm font-black text-black uppercase tracking-widest">EBYS No</label>
                      <input type="text" placeholder="EBYS No" value={formData.ebysNumber} onChange={e=>setFormData({...formData, ebysNumber:e.target.value})} className="w-full border p-3 rounded text-black font-bold uppercase"/>
                   </div>
                   <div className="space-y-2">
                      <label className="text-sm font-black text-black uppercase tracking-widest">EBYS Tarihi</label>
                      <input type="date" value={formData.ebysDate} onChange={e=>setFormData({...formData, ebysDate:e.target.value})} className="w-full border p-3 rounded text-black uppercase"/>
                   </div>
                </div>

                <div className="space-y-2">
                   <label className="text-sm font-black text-black uppercase tracking-widest">Açıklama</label>
                   <textarea placeholder="Açıklama" value={formData.description} onChange={handleDescriptionChange} className="w-full border p-3 rounded text-black uppercase font-medium tracking-tight" rows={3}/>
                </div>
                
                <div className="border border-purple-100 p-4 rounded-xl bg-purple-50/30 space-y-4">
                    <label className="block text-sm font-black text-purple-700 uppercase flex items-center gap-2 tracking-widest">
                      <Icons.ClipboardList className="w-4 h-4"/> Checklist / PN & SN Ayrıştırma
                    </label>
                    <div className="space-y-3">
                        <div className="flex gap-2">
                           <button type="button" onClick={() => checklistFileRef.current.click()} className="px-4 bg-green-600 text-white rounded-lg text-xs font-black uppercase shadow-md hover:bg-green-700 transition-all shrink-0 flex items-center gap-2">
                               <Icons.CloudUp className="w-4 h-4"/> Excel Yükle
                           </button>
                           <input type="file" ref={checklistFileRef} onChange={onChecklistExcelUpload} className="hidden" accept=".xlsx, .xls" />
                           <textarea 
                              placeholder="Veya listeyi buraya yapıştırın (Malzeme - PN: XXX - SN: YYY Adet) ve AKTAR'a basın..." 
                              value={checklistInput}
                              onChange={(e) => setChecklistInput(e.target.value)}
                              className="flex-grow border p-3 rounded-lg text-xs text-black bg-white min-h-[40px] uppercase font-bold"
                           />
                           <button type="button" onClick={handleAktar} className="px-6 bg-purple-600 text-white rounded-lg text-sm font-black uppercase shadow-md hover:bg-purple-700 transition-all shrink-0">Aktar</button>
                        </div>

                        {checklistWorkbook && (
                            <div className="bg-white border border-green-200 p-4 rounded-lg space-y-4 shadow-sm animate-in fade-in duration-300">
                                <div>
                                    <label className="text-[10px] font-black text-gray-500 uppercase block mb-2 tracking-widest">1. Sayfa Seçin: {checklistActiveSheet && <span className="text-purple-700 font-black">Seçili Sayfa: "{checklistActiveSheet}"</span>}</label>
                                    <div className="flex flex-wrap gap-2">
                                        {checklistSheets.map(s => (
                                            <button key={s} type="button" onClick={() => {
                                                setChecklistActiveSheet(s);
                                                const ws = checklistWorkbook.Sheets[s];
                                                const rows = XLSX.utils.sheet_to_json(ws, { header: 1 });
                                                if (rows.length > 0) setChecklistHeaders(rows[0]);
                                            }} className={`px-4 py-1.5 rounded-lg text-xs font-black uppercase tracking-tighter border transition-all ${checklistActiveSheet === s ? 'bg-purple-600 border-purple-600 text-white shadow-md' : 'bg-gray-50 border-gray-200 text-gray-600 hover:bg-gray-100'}`}>{s}</button>
                                        ))}
                                    </div>
                                </div>
                                {checklistActiveSheet && (
                                    <div className="space-y-3">
                                        <label className="text-[10px] font-black text-gray-500 uppercase block tracking-widest">2. Başlık Eşleştirmesi Yapın:</label>
                                        <div className="grid grid-cols-2 md:grid-cols-4 gap-3">
                                            {[
                                                { id: 'name', label: 'Malzeme Adı*' },
                                                { id: 'pn', label: 'PN (Parça No)*' },
                                                { id: 'sn', label: 'SN (Seri No)' },
                                                { id: 'qty', label: 'Miktar (Adet)*' }
                                            ].map(field => (
                                                <div key={field.id} className="space-y-1">
                                                    <span className="text-[9px] font-black text-purple-700 uppercase block">{field.label}</span>
                                                    <select value={checklistMap[field.id]} onChange={e => setChecklistMap({...checklistMap, [field.id]: e.target.value})} className="w-full text-[10px] font-black border rounded p-1.5 bg-gray-50 uppercase focus:bg-white focus:ring-1 focus:ring-purple-500 transition-all">
                                                        <option value="">Seçin...</option>
                                                        {checklistHeaders.map(h => <option key={h} value={h}>{h}</option>)}
                                                    </select>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                        
                        {processedChecklist.length > 0 && (
                          <div className="bg-white border rounded-lg overflow-hidden shadow-inner max-h-48 overflow-y-auto">
                             <table className="w-full text-[10px] table-fixed">
                                <thead className="bg-gray-50 border-b text-gray-400 font-black uppercase tracking-widest sticky top-0">
                                   <tr>
                                      <th className="px-2 py-1 text-left w-1/2">Malzeme Adı</th>
                                      <th className="px-2 py-1 text-left">P/N</th>
                                      <th className="px-2 py-1 text-left">S/N</th>
                                      <th className="px-2 py-1 text-right w-16">Adet</th>
                                   </tr>
                                </thead>
                                <tbody className="divide-y">
                                   {processedChecklist.map((it, ix) => (
                                     <tr key={ix} className="hover:bg-purple-50 transition-colors">
                                        <td className="px-2 py-1.5"><input type="text" value={it.name} onChange={(e) => handleUpdateProcessedRow(ix, 'name', e.target.value, e)} className="w-full bg-transparent border-none focus:ring-0 p-0 text-gray-700 font-black uppercase truncate" /></td>
                                        <td className="px-2 py-1.5"><input type="text" value={it.partNo} onChange={(e) => handleUpdateProcessedRow(ix, 'partNo', e.target.value, e)} className="w-full bg-transparent border-none focus:ring-0 p-0 text-purple-600 font-black" /></td>
                                        <td className="px-2 py-1.5"><input type="text" value={it.serialNo} onChange={(e) => handleUpdateProcessedRow(ix, 'serialNo', e.target.value, e)} className="w-full bg-transparent border-none focus:ring-0 p-0 text-purple-600 font-black" /></td>
                                        <td className="px-2 py-1.5"><input type="number" value={it.requested} onChange={(e) => handleUpdateProcessedRow(ix, 'requested', parseInt(e.target.value) || 0)} className="w-full bg-transparent border-none focus:ring-0 p-0 text-right text-purple-800 font-black" /></td>
                                     </tr>
                                   ))}
                                </tbody>
                             </table>
                          </div>
                        )}

                        <div className="space-y-3">
                            <label className="text-[10px] font-bold text-gray-500 uppercase tracking-widest font-black">Manuel Malzeme Ekle:</label>
                            {manualChecklistItems.map((item, idx) => (
                                <div key={idx} className="flex gap-2">
                                    <input type="text" placeholder="Malzeme Adı" value={item.name} onChange={e => handleUpdateManualRow(idx, 'name', e.target.value, e)} className="flex-grow border p-2 rounded-lg text-xs text-gray-900 uppercase font-black" />
                                    <input type="text" placeholder="P/N" value={item.partNo} onChange={e => handleUpdateManualRow(idx, 'partNo', e.target.value, e)} className="w-40 border p-2 rounded-lg text-xs text-gray-900 uppercase font-black" />
                                    <input type="text" placeholder="S/N" value={item.serialNo} onChange={e => handleUpdateManualRow(idx, 'serialNo', e.target.value, e)} className="w-40 border p-2 rounded-lg text-xs text-gray-900 uppercase font-black" />
                                    <input type="number" placeholder="Adet" value={item.requested} onChange={e => handleUpdateManualRow(idx, 'requested', parseInt(e.target.value) || 0)} className="w-24 border p-2 rounded-lg text-xs text-gray-900 font-bold" />
                                </div>
                            ))}
                            <button type="button" onClick={handleAddManualRow} className="text-xs text-blue-600 font-black hover:underline uppercase tracking-tight">+ Yeni Satır Ekle</button>
                        </div>
                    </div>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 pt-4">
                    <div className="space-y-3">
                        <label className="text-sm font-bold text-gray-700 uppercase tracking-widest font-black">Talep Eden Birimler</label>
                        <div className="flex flex-wrap gap-2 p-3 border rounded min-h-[60px] bg-gray-50 shadow-inner">
                            {formData.requestingUnits.map(u=><span key={u} className="bg-blue-100 text-blue-800 text-xs px-3 py-1.5 rounded-full flex items-center gap-2 uppercase font-black">{u} <button type="button" onClick={()=>handleRemoveUnit(u)} className="hover:text-red-500 transition-colors"><Icons.XCircle className="w-4 h-4"/></button></span>)}
                            {formData.requestingUnits.length === 0 && <span className="text-xs text-gray-400 font-bold italic">En az bir birim seçin...</span>}
                        </div>
                        <div className="flex gap-2">
                            <select value={formData.unitToAdd} onChange={e=>setFormData({...formData, unitToAdd:e.target.value})} className="border p-2 text-sm flex-grow text-gray-900 uppercase font-black rounded-lg">
                                <option value="" disabled>Birim Seçin...</option>
                                {Object.values(RequestingUnit).filter(u=>!formData.requestingUnits.includes(u)).map(u=><option key={u} value={u}>{u}</option>)}
                            </select>
                            <button type="button" onClick={handleAddUnit} className="bg-blue-50 border border-blue-200 px-6 rounded-lg text-sm text-blue-700 hover:bg-blue-100 transition-colors font-black tracking-widest uppercase shadow-sm min-w-[120px]">Birim Ekle</button>
                        </div>
                    </div>
                    <div className="grid grid-cols-1 gap-4">
                        <div className="space-y-1">
                           <label className="text-[10px] font-black text-black uppercase tracking-widest">Talep Türü</label>
                           <select value={formData.type} onChange={e=>setFormData({...formData, type: String(e.target.value)})} className="w-full border p-3 rounded-lg text-black text-sm bg-white uppercase font-black tracking-widest shadow-sm">{Object.values(DemandType).map(t=><option key={t} value={t}>{t}</option>)}</select>
                        </div>
                        <div className="space-y-1">
                           <label className="text-[10px] font-black text-black uppercase tracking-widest">Öncelik Durumu</label>
                           <select value={formData.priority} onChange={e=>setFormData({...formData, priority: String(e.target.value)})} className="w-full border p-3 rounded-lg text-black text-sm bg-white uppercase font-black tracking-widest shadow-sm">{Object.values(DemandPriority).map(p=><option key={p} value={p}>{p}</option>)}</select>
                        </div>
                        <div className="space-y-1">
                           <label className="text-[10px] font-black text-black uppercase tracking-widest">İşlem Durumu</label>
                           <select value={formData.status} onChange={e=>setFormData({...formData, status: String(e.target.value)})} className="w-full border p-3 rounded-lg text-black text-sm bg-white uppercase font-black tracking-widest shadow-sm">{Object.values(DemandStatus).filter(s => s !== DemandStatus.YENI).map(s=><option key={s} value={s}>{s}</option>)}</select>
                        </div>
                    </div>
                </div>
                <div className="flex justify-end items-center gap-4 pt-8 border-t">
                    {!demandToEdit && (
                        <label className="flex items-center gap-2 text-xs font-black text-blue-700 uppercase cursor-pointer select-none mr-auto">
                            <input 
                                type="checkbox" 
                                checked={transferToMaterialList} 
                                onChange={e => setTransferToMaterialList(e.target.checked)} 
                                className="rounded text-blue-600 w-4 h-4" 
                            />
                            GELEN MALZEME LİSTESİNE AKTAR
                        </label>
                    )}
                    <button type="button" onClick={onClose} className="px-6 py-3 bg-gray-100 rounded-xl text-gray-900 hover:bg-gray-200 transition-colors uppercase font-black tracking-widest border border-gray-200">İptal</button>
                    <button type="submit" className={`px-12 py-3 rounded-xl font-black uppercase text-sm shadow-xl transition-all ${processedChecklist.length === 0 && checklistInput.trim() ? 'bg-gray-400 cursor-not-allowed' : 'bg-blue-600 text-white hover:bg-blue-700 transform hover:-translate-y-0.5'}`}>KAYDET</button>
                </div>
            </form>
            )}
          </div>
        </div>
      );
    };

    // --- KanbanCard ---
    const KanbanCard = ({ demand, onEdit, onShowProgress, onRequestDelete, isProcessing, currentTime, sequenceNumber }) => {
      const priorityStyles = {
        [DemandPriority.YUKSEK]: { bg: 'bg-red-100', text: 'text-red-700' },
        [DemandPriority.ORTA]: { bg: 'bg-orange-100', text: 'text-orange-700' },
        [DemandPriority.DUSUK]: { bg: 'bg-yellow-100', text: 'text-yellow-700' },
      };
      const statusTypeStyles = {
        [DemandStatus.YENI]: 'bg-blue-100 text-blue-800',
        [DemandStatus.ISLEMDE]: 'bg-orange-100 text-orange-800',
        [DemandStatus.TAMAMLANDI]: 'bg-green-100 text-green-800',
      };
      const pStyles = priorityStyles[demand.priority] || priorityStyles[DemandPriority.ORTA];
      const tStyle = statusTypeStyles[demand.status] || statusTypeStyles[DemandStatus.YENI];
      
      const handleEditClick = (e) => { e.stopPropagation(); onEdit(demand); };
      const handleDeleteClick = (e) => { e.stopPropagation(); onRequestDelete(demand.id); };

      const hasActiveReminder = demand.progressHistory.some(
          item => item.reminderDate && new Date(item.reminderDate) <= currentTime && !item.reminderRead
      );

      const openDays = calculateOpenDaysLocal(demand.ebysDate);
      const ebysDateDisplay = demand.ebysDate === 'N/A' ? 'N/A' : demand.ebysDate.split('T')[0].split('-').reverse().join('.');

      const isPartiallyCompleted = demand.progressHistory.some(h => {
          if (!h.isKalanIsler) return false;
          const parts = h.description.split('|');
          if (parts.length >= 3) {
            const gelenValue = parts[2].split(':')[1];
            const gelen = (parseInt(gelenValue) || 0);
            return gelen > 0;
          }
          return false;
      });

      return (
        <div className={`relative bg-white rounded-lg shadow-sm p-4 mb-4 border hover:shadow-lg transition-all duration-200 flex flex-col cursor-pointer ${hasActiveReminder ? 'border-red-500 animate-pulse-red' : 'border-gray-200'}`} onDoubleClick={() => onShowProgress(demand)}>
          {hasActiveReminder && (
              <div className="absolute -top-2 right-2 bg-red-600 text-white text-[10px] font-bold px-2 py-0.5 rounded-full shadow z-10 animate-flash uppercase tracking-widest">
                  HATIRLATMA
              </div>
          )}
          <div className="flex justify-between items-start mb-2">
            <div className="flex items-center gap-2">
              <span className="bg-gray-800 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-sm">{sequenceNumber}</span>
              <span className={`text-xs font-semibold px-2.5 py-0.5 rounded ${tStyle} uppercase tracking-widest`}>{demand.type}</span>
            </div>
            <div className="flex space-x-2 flex-shrink-0">
              <button onClick={handleEditClick} className="text-gray-400 hover:text-blue-600 transition-colors" title="Düzenle"><Icons.Edit className="w-4 h-4" /></button>
              <button onClick={handleDeleteClick} className="text-gray-400 hover:text-red-500 transition-colors" title="Sil"><Icons.Trash className="w-4 h-4" /></button>
            </div>
          </div>
          <h4 className="font-semibold text-gray-800 break-words mb-2 uppercase font-black tracking-tight">{demand.title}</h4>
          {demand.requestingUnit && (
            <div className="flex items-center text-sm text-black mb-2">
              <Icons.Building className="w-4 h-4 mr-1.5 text-gray-400" />
              <span className="font-medium uppercase tracking-widest">{demand.requestingUnit}</span>
            </div>
          )}
          {demand.assignedTo && (
              <div className="text-[10px] text-blue-700 font-black mb-2 uppercase tracking-widest truncate" title={demand.assignedTo}>İşi Alan: {demand.assignedTo}</div>
          )}
          <p className="text-sm text-black mb-4 break-words flex-grow line-clamp-3 uppercase font-bold tracking-tight leading-tight">{demand.description}</p>
          <div className="border-t border-gray-200 pt-3 mt-auto space-y-2">
            {isPartiallyCompleted && demand.status !== DemandStatus.TAMAMLANDI && (
               <div className="text-green-800 font-bold text-xs uppercase tracking-tight font-black">Kısmen Tamamlanmış</div>
            )}
            <div className="flex justify-between items-center text-xs text-gray-500">
              <div className="flex flex-col">
                <span className="font-semibold text-black uppercase tracking-widest">EBYS NO: {demand.ebysNumber}</span>
                {openDays !== null && demand.status !== DemandStatus.TAMAMLANDI && (
                  <span className="text-red-600 font-black uppercase mt-0.5 tracking-widest">{openDays} GÜNDÜR AÇIK</span>
                )}
                {demand.status === DemandStatus.TAMAMLANDI && demand.progressHistory.some(h => h.isCompletionNote) && (
                   <span className="text-green-600 font-black uppercase mt-0.5 tracking-widest">
                    TAMAMLANMA: {new Date(demand.progressHistory.find(h => h.isCompletionNote).date).toLocaleDateString('tr-TR')}
                   </span>
                )}
              </div>
              <span className="flex items-center gap-1.5 uppercase font-bold"><Icons.Calendar className="w-4 h-4" />{ebysDateDisplay}</span>
            </div>
            <div className="flex justify-between items-center text-xs">
              <span className={`inline-flex items-center gap-1.5 px-2 py-1 rounded-full font-medium ${pStyles.bg} ${pStyles.text} uppercase font-black tracking-widest`}><Icons.Flag className="w-3 h-3"/>{demand.priority}</span>
            </div>
          </div>
          {isProcessing && (
            <div className="absolute inset-0 bg-white/70 rounded-lg flex items-center justify-center transition-opacity duration-300">
              <svg className="animate-spin h-8 w-8 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"></circle><path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
            </div>
          )}
        </div>
      );
    };

    // --- KanbanColumn ---
    const KanbanColumn = ({ status, demands, onEdit, onShowProgress, onRequestDelete, processingDemands, currentTime }) => {
      const statusStyles = {
        [DemandStatus.YENI]: { border: 'border-blue-500', text: 'text-blue-600' },
        [DemandStatus.ISLEMDE]: { border: 'border-orange-500', text: 'text-orange-600' },
        [DemandStatus.TAMAMLANDI]: { border: 'border-green-500', text: 'text-green-600' },
      };
      const statusDisplayNames = { [DemandStatus.YENI]: 'İŞLEMDEKİ TALEPLER', [DemandStatus.ISLEMDE]: 'İŞLEMDEKİ TALEPLER', [DemandStatus.TAMAMLANDI]: 'TAMAMLANAN TALEPLER' };
      const styles = statusStyles[status] || statusStyles[DemandStatus.YENI];

      return (
        <div className="bg-gray-100 rounded-lg p-4 w-full flex flex-col min-h-[calc(100vh-260px)] shadow-inner">
          <div className={`border-l-4 ${styles.border} pl-2 mb-4`}>
            <h3 className={`font-bold text-lg ${styles.text} flex items-center gap-2 uppercase tracking-widest`}>
              {statusDisplayNames[status] || status}
              <span className="text-sm bg-gray-200 text-gray-600 rounded-full px-2.5 py-0.5 font-black">{demands.length}</span>
            </h3>
          </div>
          <div className="flex-grow">
            {demands.map((demand, idx) => <KanbanCard key={demand.id} demand={demand} onEdit={onEdit} onShowProgress={onShowProgress} onRequestDelete={onRequestDelete} isProcessing={processingDemands.has(demand.id)} currentTime={currentTime} sequenceNumber={idx + 1} />)}
            {demands.length === 0 && (
              <div className="flex items-center justify-center h-full text-center text-sm text-gray-500 py-10 uppercase font-black tracking-widest opacity-25">
                <div className="bg-white/50 p-8 rounded-lg border-2 border-dashed border-gray-300">Bu bölümde talep bulunmuyor.</div>
              </div>
            )}
          </div>
        </div>
      );
    };

    // --- KanbanBoard ---
    const KanbanBoard = ({ demands, onEdit, activeStatus, onShowProgress, onRequestDelete, processingDemands, currentTime }) => (
      <div className="px-4 sm:px-6 md:px-8 pb-8 pt-4">
        <div className="w-full">
          <KanbanColumn key={activeStatus} status={activeStatus} demands={demands} onEdit={onEdit} onShowProgress={onShowProgress} onRequestDelete={onRequestDelete} processingDemands={processingDemands} currentTime={currentTime} />
        </div>
      </div>
    );

    // --- LandingScreen Component ---
    const LandingScreen = ({ onNavigate }) => {
      return (
        <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
          <div className="mb-12 text-center">
            <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExeTcwam1sYXJkazRoMTUxMWM1b2h6MTUwZDY1MXo5eThraGw4dG5kMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/n7frjzkahqcqyik0o3/giphy.gif" alt="Logo" className="h-24 w-auto mx-auto mix-blend-multiply mb-4" />
            <h1 className="text-4xl font-black text-gray-900 uppercase tracking-[0.2em]">Hava Araçları Bakım Şube</h1>
            <p className="text-gray-500 mt-2 font-bold uppercase tracking-widest">Sistem Yönetim Paneli</p>
          </div>
          
          <div className="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-5xl w-full">
            <button 
              onClick={() => onNavigate('taskline')}
              className="group bg-white p-10 rounded-3xl shadow-xl hover:shadow-2xl transition-all duration-300 border-2 border-transparent hover:border-blue-500 text-left flex flex-col items-start"
            >
              <div className="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center mb-6 text-blue-600 group-hover:scale-110 transition-transform">
                <Icons.List className="w-8 h-8" />
              </div>
              <h2 className="text-2xl font-black text-gray-900 uppercase tracking-widest mb-3">Taskline Giriş</h2>
              <p className="text-gray-500 font-medium leading-relaxed">İş taleplerini yönetmek, akış notları eklemek ve malzeme takibi yapmak için giriş yapın.</p>
              <div className="mt-8 flex items-center gap-2 text-blue-600 font-black uppercase text-sm tracking-widest">
                Sisteme Git <Icons.ChevronRight className="w-4 h-4" />
              </div>
            </button>

            <button 
              onClick={() => onNavigate('evrak_gonder')}
              className="group bg-white p-10 rounded-3xl shadow-xl hover:shadow-2xl transition-all duration-300 border-2 border-transparent hover:border-green-500 text-left flex flex-col items-start"
            >
              <div className="w-16 h-16 bg-green-100 rounded-2xl flex items-center justify-center mb-6 text-green-600 group-hover:scale-110 transition-transform">
                <Icons.FileUp className="w-8 h-8" />
              </div>
              <h2 className="text-2xl font-black text-gray-900 uppercase tracking-widest mb-3">Evrak Gönder</h2>
              <p className="text-gray-500 font-medium leading-relaxed">Teknik şartnameler, talep yazıları ve diğer evrakları hızlıca ilgili birimlere ulaştırın.</p>
              <div className="mt-8 flex items-center gap-2 text-green-600 font-black uppercase text-sm tracking-widest">
                Portala Git <Icons.ChevronRight className="w-4 h-4" />
              </div>
            </button>
          </div>

          <div className="mt-16 text-gray-400 text-xs font-bold uppercase tracking-widest">
            © 2024 Bakım Şube Müdürlüğü - Tüm Hakları Saklıdır
          </div>
        </div>
      );
    };

    const EvrakGonder = ({ onBack, demands = [], onUpdateDemand, SCRIPT_URL }) => {
      const [step, setStep] = useState(1); // 1: Search & Name, 2: Scan, 3: Preview, 4: Mail Draft
      const [scanning, setScanning] = useState(false);
      const [capturedPages, setCapturedPages] = useState([]);
      const [selectedDemand, setSelectedDemand] = useState(null);
      const [searchTerm, setSearchTerm] = useState('');
      const [documentName, setDocumentName] = useState('YENI_EVRAK');
      const [mailBody, setMailBody] = useState('');
      const [sending, setSending] = useState(false);
      
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const streamRef = useRef(null);

      const openDemands = demands.filter(d => d.status !== DemandStatus.TAMAMLANDI);
      const filteredDemands = searchTerm.length > 0 ? openDemands.filter(d => {
        try {
          const title = String(d.title || '').toLocaleLowerCase('tr-TR');
          const ebys = String(d.ebysNumber || '').toLocaleLowerCase('tr-TR');
          const search = (searchTerm || '').toLocaleLowerCase('tr-TR');
          return title.includes(search) || ebys.includes(search);
        } catch (e) {
          return false;
        }
      }) : [];

      const [hasCameraPermission, setHasCameraPermission] = useState(false);
      const [cameraError, setCameraError] = useState(null);
      const [isRequestingPermission, setIsRequestingPermission] = useState(false);

      const requestPermissionAndStart = async () => {
        setCameraError(null);
        setIsRequestingPermission(true);
        
        try {
          if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
            throw new Error("Tarayıcınız kamera erişimini desteklemiyor veya bağlantınız güvenli (HTTPS) değil.");
          }

          let stream = null;
          let lastErr = null;

          // Sequential attempt - Simpler constraints for better phone compatibility
          const constraints = [
            { video: { facingMode: { ideal: "environment" } }, audio: false },
            { video: true, audio: false }
          ];

          for (const constraint of constraints) {
            try {
              console.log("Requesting camera:", constraint);
              stream = await navigator.mediaDevices.getUserMedia(constraint);
              if (stream) break;
            } catch (e) {
              console.error("Attempt failed:", e);
              lastErr = e;
            }
          }

          if (!stream) {
            throw lastErr || new Error("Kamera cihazı başlatılamadı.");
          }

          streamRef.current = stream;
          setHasCameraPermission(true);
          setIsRequestingPermission(false);
          setStep(2); // Success! Move to scanner
          
          const attachStream = () => {
            if (videoRef.current) {
              videoRef.current.srcObject = stream;
              videoRef.current.onloadedmetadata = () => {
                videoRef.current.play().then(() => {
                  setScanning(true);
                }).catch(err => {
                  console.error("Video play failed:", err);
                  setCameraError("Kamera akışı oynatılamadı.");
                });
              };
            } else {
              setTimeout(attachStream, 100);
            }
          };

          setTimeout(attachStream, 150);
          
        } catch (err) {
          console.error("Camera Final Error:", err);
          setIsRequestingPermission(false);
          setStep(2); 
          let errorMsg = "Kamera başlatılamadı.";
          if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
            const isIframe = window.self !== window.top;
            errorMsg = "Kamera erişim izni reddedildi. Chrome ayarlarınız 'Sor' olarak görünse bile, bu site için engel konulmuş olabilir.";
            if (isIframe) {
              errorMsg += " Lütfen uygulamayı 'YENİ SEKMEDE AÇ' butonu ile açıp tekrar deneyin (iFrame kısıtlaması olabilir).";
            } else {
              errorMsg += " Lütfen adres çubuğundaki kilit simgesine tıklayıp kameraya İZİN VERİLDİĞİNDEN emin olun.";
            }
          } else if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
            errorMsg = "Sisteminizde aktif bir kamera bulunamadı.";
          } else {
            errorMsg = `Hata: ${err.message || 'Bilinmeyen bir sorun oluştu.'}`;
          }
          setCameraError(errorMsg);
        }
      };

      const startCamera = async () => {
        if (streamRef.current) {
          if (videoRef.current) videoRef.current.srcObject = streamRef.current;
          setScanning(true);
          return;
        }
        await requestPermissionAndStart();
      };

      const stopCamera = () => {
        if (streamRef.current) {
          streamRef.current.getTracks().forEach(track => track.stop());
          streamRef.current = null;
        }
        setScanning(false);
      };

      const capturePage = () => {
        if (!videoRef.current || !canvasRef.current) return;
        const canvas = canvasRef.current;
        const video = videoRef.current;
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
        setCapturedPages(prev => [...prev, dataUrl]);
      };

      const removePage = (index) => {
        setCapturedPages(prev => prev.filter((_, i) => i !== index));
      };

      const generatePDFBlob = async () => {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF();
        for (let i = 0; i < capturedPages.length; i++) {
          if (i > 0) pdf.addPage();
          const img = capturedPages[i];
          pdf.addImage(img, 'JPEG', 10, 10, 190, 277);
        }
        return pdf.output('blob');
      };

      const blobToBase64 = (blob) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onloadend = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
      };

      const generateInitialMailBody = () => {
        return `SAYIN İLGİLİLER,\n\n${selectedDemand ? selectedDemand.ebysNumber + ' EBYS NUMARALI ' : ''}${documentName.toUpperCase()} KONULU EVRAK EKTE SUNULMUŞTUR.\n\nİYİ ÇALIŞMALAR DİLERİZ.`;
      };

      const handleGoToMailStep = () => {
        setMailBody(generateInitialMailBody());
        setStep(4);
      };

      const handleFinalSend = async () => {
        if (capturedPages.length === 0) { alert("LÜTFEN EN AZ BİR SAYFA TARAYIN."); return; }
        setSending(true);
        try {
          const pdfBlob = await generatePDFBlob();
          const pdfBase64 = await blobToBase64(pdfBlob);
          const mailPayload = {
            subject: `${selectedDemand ? selectedDemand.ebysNumber : 'HARİCİ'} - ${documentName.toUpperCase()}`,
            body: mailBody,
            fileName: `${documentName.toUpperCase()}.pdf`,
            fileData: pdfBase64,
            demandId: selectedDemand ? selectedDemand.id : null,
            documentTitle: documentName.toUpperCase()
          };
          const response = await fetch(SCRIPT_URL, {
            method: 'POST',
            mode: 'cors',
            body: JSON.stringify({ action: 'sendEmailWithAttachment', payload: mailPayload })
          });
          const result = await response.json();
          if (result.status === 'success') {
            alert("EVRAK BAŞARIYLA GÖNDERİLDİ VE AKIŞ NOTU EKLENDİ.");
            if (selectedDemand && onUpdateDemand) {
              const now = new Date();
              const note = `${now.toLocaleString('tr-TR')} TARİHİNDE DESTEK HİZMETLERİ ŞUBE MÜDÜRLÜĞÜNE "${documentName.toUpperCase()}" ADLI EVRAK GÖNDERİLMİŞTİR.`;
              const updatedDemand = {
                ...selectedDemand,
                progressHistory: [
                  ...selectedDemand.progressHistory,
                  { date: now.toISOString(), description: note, isSupportNote: false }
                ]
              };
              onUpdateDemand(updatedDemand);
            }
            onBack();
          } else { throw new Error(result.message); }
        } catch (err) {
          alert("GÖNDERİM HATASI: " + err.message);
        } finally { setSending(false); }
      };

      return (
        <div className="min-h-screen bg-gray-50 flex flex-col">
          <header className="bg-white shadow-sm p-4 flex justify-between items-center border-b sticky top-0 z-50">
            <div className="flex items-center gap-3">
              <button 
                onClick={() => {
                  stopCamera();
                  if (step > 1) setStep(step - 1);
                  else onBack();
                }} 
                className="p-2 hover:bg-gray-100 rounded-full text-black transition-colors"
                disabled={sending}
              >
                <Icons.ArrowLeft className="w-6 h-6" />
              </button>
              <h1 className="text-xl font-black text-black uppercase tracking-widest">
                {step === 1 ? 'EVRAK BİLGİLERİ' : step === 2 ? 'EVRAK TARAMA' : step === 3 ? 'ÖNİZLEME' : 'MAİL GÖNDERİMİ'}
              </h1>
            </div>
            <div className="text-xs font-black text-black uppercase tracking-tighter">ADIM {step} / 4</div>
          </header>
          
          <main className="flex-grow max-w-2xl mx-auto w-full p-4 md:p-8">
            {/* STEP 1: SEARCH & IDENTIFY */}
            {step === 1 && (
              <div className="space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
                {isRequestingPermission && (
                  <div className="fixed inset-0 bg-black/80 backdrop-blur-md z-[100] flex flex-col items-center justify-center p-8 text-center animate-in zoom-in-95 duration-300">
                    <div className="w-24 h-24 bg-blue-500/20 rounded-full flex items-center justify-center mb-8 animate-pulse">
                      <Icons.Camera className="w-12 h-12 text-blue-500" />
                    </div>
                    <h2 className="text-2xl font-black text-white mb-4 uppercase tracking-tighter">Kamera Erişimi İstenecek</h2>
                    <p className="text-gray-300 text-sm max-w-xs mb-8 leading-relaxed font-medium uppercase tracking-wide">
                      TELEFONUNUZUN EKRANINDA ÇIKACAK OLAN <span className="text-blue-400 font-black">"İZİN VER"</span> VEYA <span className="text-blue-400 font-black">"EVET"</span> BUTONUNA TIKLAYINIZ.
                    </p>
                    <div className="flex items-center gap-2">
                       <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.3s]"></div>
                       <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce [animation-delay:-0.15s]"></div>
                       <div className="w-2 h-2 bg-blue-500 rounded-full animate-bounce"></div>
                    </div>
                  </div>
                )}
                <div className="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                  <div className="space-y-6">
                    {/* Search Field First */}
                    <div className="space-y-2">
                       <label className="block text-[10px] font-black text-black uppercase tracking-[0.2em] ml-1">İLGİLİ TALEBİ BULUN</label>
                       <div className="relative">
                          <input 
                            type="text" className="w-full px-4 py-4 bg-gray-100 border-none rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition-all font-bold uppercase text-black"
                            placeholder="EBYS NO VEYA BAŞLIK YAZIN..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                          />
                       </div>
                    </div>

                    {/* Results pop out only when searching */}
                    {filteredDemands.length > 0 && !selectedDemand && (
                      <div className="max-h-48 overflow-y-auto space-y-2 custom-scrollbar p-1 border-t pt-4">
                        {filteredDemands.map(d => (
                          <button key={d.id} onClick={() => { setSelectedDemand(d); setSearchTerm(d.ebysNumber); }} className="w-full text-left p-4 rounded-2xl border border-gray-100 bg-gray-50 hover:border-blue-400 transition-all">
                            <div className="text-[10px] font-black text-black mb-1 tracking-widest uppercase">EBYS: {d.ebysNumber}</div>
                            <div className="text-sm font-black uppercase truncate text-black">{d.title}</div>
                          </button>
                        ))}
                      </div>
                    )}

                    {/* Selection Info & Filename Input under it */}
                    {(selectedDemand || searchTerm.length > 0) && (
                      <div className="space-y-4 animate-in fade-in zoom-in-95 duration-300">
                        {selectedDemand && (
                          <div className="bg-gray-100 p-4 rounded-xl text-black flex items-center justify-between border-2 border-blue-500 shadow-sm">
                            <div className="flex items-center gap-3">
                              <div className="w-8 h-8 bg-blue-500 rounded-lg flex items-center justify-center">
                                <Icons.Check className="w-5 h-5 text-white" />
                              </div>
                              <div className="text-xs font-black uppercase truncate max-w-[200px] text-black">{selectedDemand.title}</div>
                            </div>
                            <button onClick={() => { setSelectedDemand(null); setSearchTerm(''); }} className="text-[10px] font-black underline text-blue-600 hover:text-blue-800">DEĞİŞTİR</button>
                          </div>
                        )}

                        <div className="space-y-2">
                          <label className="block text-[10px] font-black text-black uppercase tracking-[0.2em] ml-1">YÜKLENECEK DOSYANIN ADI (MANUEL)</label>
                          <input 
                            type="text" 
                            className="w-full p-4 bg-gray-100 border-none rounded-xl font-black text-black uppercase focus:ring-2 focus:ring-blue-500 outline-none"
                            value={documentName} 
                            onChange={(e) => setDocumentName((e.target.value || '').toLocaleUpperCase('tr-TR'))}
                            placeholder="DOSYA ADINI BURAYA YAZIN..."
                          />
                        </div>
                      </div>
                    )}
                  </div>

                  <button 
                    onClick={requestPermissionAndStart} 
                    disabled={!documentName}
                    className="w-full mt-8 py-5 bg-black text-white rounded-2xl font-black uppercase tracking-[0.2em] shadow-xl hover:bg-gray-800 transition-all flex items-center justify-center gap-3 disabled:opacity-30"
                  >
                    BELGE TARAMAYA BAŞLA <Icons.ChevronRight className="w-5 h-5" />
                  </button>
                </div>
              </div>
            )}

            {/* STEP 2: CAMERA SCANNER */}
            {step === 2 && (
              <div className="fixed inset-0 bg-black z-[60] flex flex-col animate-in fade-in duration-300">
                <div className="relative flex-grow flex items-center justify-center overflow-hidden">
                  {cameraError ? (
                    <div className="max-w-md mx-6 p-8 bg-white/10 backdrop-blur-xl border border-white/20 rounded-3xl text-center shadow-2xl">
                      <div className="w-16 h-16 bg-red-500/20 rounded-full flex items-center justify-center mx-auto mb-6">
                        <Icons.AlertCircle className="w-8 h-8 text-red-500" />
                      </div>
                      <h3 className="text-xl font-black text-white mb-4 uppercase tracking-tighter">Kamera Açılırken Hata Oluştu</h3>
                      <p className="text-gray-300 text-sm mb-6 leading-relaxed font-medium">{cameraError}</p>
                      
                      {/* Technical Info for Debugging */}
                      <div className="mb-6 p-2 bg-black/30 rounded border border-white/5 text-left">
                        <p className="text-[9px] font-mono text-gray-500 uppercase tracking-widest leading-tight">
                          HATA DETAYI: {cameraError ? cameraError.split(':')[0] : 'BİLİNMİYOR'}<br/>
                          OTURUM MODU: {window.self !== window.top ? 'ÇERÇEVE (IFRAME)' : 'TAM EKRAN'}<br/>
                          BAĞLANTI: {window.location.protocol === 'https:' ? 'GÜVENLİ (HTTPS)' : 'GÜVENSİZ (HTTP)'}
                        </p>
                      </div>
                      
                      <div className="bg-red-500/10 border border-red-500/30 rounded-xl p-4 mb-8 text-left">
                        <p className="text-[10px] text-red-200 font-black uppercase mb-2 tracking-widest">Çözüm Önerileri:</p>
                        <ul className="text-[10px] text-gray-300 space-y-2 list-disc pl-4 font-bold uppercase tracking-tighter">
                          <li>ANDROID AYARLARINDAN CHROME UYGULAMASININ KAMERA İZNİNİN AÇIK OLDUĞUNDAN EMİN OLUN.</li>
                          <li>ADRES ÇUBUĞUNDAKİ <Icons.X className="w-3 h-3 inline rotate-45" /> (KİLİT) SİMGESİNE TIKLAYIP ENGELİ KALDIRIN.</li>
                          <li>TARAYICIYI TAMAMEN KAPATIP YENİDEN AÇIN.</li>
                          {window.self !== window.top && <li className="text-blue-300 underline font-black">BU UYGULAMAYI YENİ SEKMEDE AÇ BUTONUNA TIKLAYARAK KULLANIN.</li>}
                        </ul>
                      </div>
                      <div className="space-y-3">
                        {window.self !== window.top && (
                          <button 
                            onClick={() => window.open(window.location.href, '_blank')}
                            className="w-full py-4 bg-blue-600 text-white rounded-xl font-black uppercase text-xs tracking-widest hover:bg-blue-700 transition-all shadow-lg flex items-center justify-center gap-2"
                          >
                            <Icons.ExternalLink className="w-4 h-4" /> YENİ SEKMEDE AÇ (ÖNERİLEN)
                          </button>
                        )}
                        <button 
                          onClick={requestPermissionAndStart}
                          className="w-full py-4 bg-white text-black rounded-xl font-black uppercase text-xs tracking-widest hover:bg-gray-200 transition-all shadow-lg order-first mb-3"
                        >
                          TEKRAR DENE
                        </button>
                        <button 
                          onClick={() => { setStep(1); setCameraError(null); }}
                          className="w-full py-4 bg-white/10 text-white border border-white/20 rounded-xl font-bold uppercase text-xs tracking-widest hover:bg-white/20 transition-all"
                        >
                          GERİ DÖN
                        </button>
                      </div>
                    </div>
                  ) : (
                    <>
                      <video 
                        ref={videoRef} 
                        autoPlay 
                        playsInline 
                        muted 
                        className="w-full h-full object-cover" 
                      />
                      {/* Smart Scanner Overlay */}
                      <div className="absolute inset-0 pointer-events-none flex items-center justify-center">
                        {/* Pulsing Guide Frame / Automatic Border Simulation */}
                        <div className="w-[85%] h-[75%] border-2 border-green-500/10 rounded-xl relative overflow-hidden backdrop-blur-[1px]">
                          {/* Recognition Corners Animation */}
                          <div className="absolute top-0 left-0 w-24 h-24 border-t-4 border-l-4 border-green-500 rounded-tl-3xl transition-all duration-700 animate-[bracket-tl_2s_infinite]"></div>
                          <div className="absolute top-0 right-0 w-24 h-24 border-t-4 border-r-4 border-green-500 rounded-tr-3xl transition-all duration-700 animate-[bracket-tr_2s_infinite]"></div>
                          <div className="absolute bottom-0 left-0 w-24 h-24 border-b-4 border-l-4 border-green-500 rounded-bl-3xl transition-all duration-700 animate-[bracket-bl_2s_infinite]"></div>
                          <div className="absolute bottom-0 right-0 w-24 h-24 border-b-4 border-r-4 border-green-500 rounded-br-3xl transition-all duration-700 animate-[bracket-br_2s_infinite]"></div>
                          
                          {/* Scanning Line Animation */}
                          <div className="absolute top-0 left-0 w-full h-1 bg-green-500/50 shadow-[0_0_20px_rgba(34,197,94,1)] animate-[scan_2.5s_ease-in-out_infinite]"></div>
                          
                          <style>{`
                            @keyframes scan {
                              0% { top: 0%; opacity: 0; }
                              5% { opacity: 1; }
                              50% { top: 100%; }
                              95% { opacity: 1; }
                              100% { top: 100%; opacity: 0; }
                            }
                            @keyframes bracket-tl { 0%, 100% { top: 0; left: 0; } 50% { top: 10px; left: 10px; } }
                            @keyframes bracket-tr { 0%, 100% { top: 0; right: 0; } 50% { top: 10px; right: 10px; } }
                            @keyframes bracket-bl { 0%, 100% { bottom: 0; left: 0; } 50% { bottom: 10px; left: 10px; } }
                            @keyframes bracket-br { 0%, 100% { bottom: 0; right: 0; } 50% { bottom: 10px; right: 10px; } }
                          `}</style>
                          
                          {/* Status Info Overlay */}
                          <div className="absolute top-8 left-1/2 -translate-x-1/2 bg-black/80 px-6 py-3 rounded-2xl border border-green-500/50 shadow-2xl flex items-center gap-3">
                            <div className="w-2 h-2 bg-green-500 rounded-full animate-ping"></div>
                            <span className="text-[10px] text-green-400 font-black tracking-[0.3em] uppercase">AKILLI BELGE ALGILAMA AKTİF</span>
                          </div>
                      
                          {/* Center Focus Mark */}
                          <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-12 h-12 border border-white/20 rounded-full flex items-center justify-center">
                            <div className="w-1 h-1 bg-white rounded-full"></div>
                          </div>
                        </div>
                      </div>
                    </>
                  )}
                </div>
                
                {!cameraError && (
                  <div className="bg-black/90 p-8 flex items-center justify-between">
                    <button onClick={() => { stopCamera(); setStep(1); }} className="text-white font-black uppercase text-xs tracking-widest">GERİ</button>
                    <div className="flex flex-col items-center">
                      <button onClick={capturePage} className="w-20 h-20 bg-white rounded-full flex items-center justify-center p-1">
                        <div className="w-full h-full border-4 border-gray-900 rounded-full bg-white flex items-center justify-center">
                           <Icons.Camera className="w-8 h-8 text-black" />
                        </div>
                      </button>
                      <span className="text-white text-[10px] font-black mt-2">{capturedPages.length} SAYFA ÇEKİLDİ</span>
                    </div>
                    <button onClick={() => { stopCamera(); setStep(3); }} disabled={capturedPages.length === 0} className="bg-green-600 text-white px-6 py-4 rounded-xl font-black uppercase text-xs tracking-widest disabled:opacity-30">ÖNİZLEME</button>
                  </div>
                )}
                <canvas ref={canvasRef} className="hidden" />
              </div>
            )}

            {/* STEP 3: PREVIEW & MANAGE PAGES */}
            {step === 3 && (
              <div className="space-y-6 animate-in fade-in slide-in-from-right-4 duration-500">
                 <div className="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                    <div className="space-y-6">
                       <div className="grid grid-cols-2 gap-4">
                          {capturedPages.map((page, idx) => (
                            <div key={idx} className="relative group">
                               <img src={page} className="w-full h-48 object-cover rounded-xl border-2 border-gray-100 shadow-sm" />
                               <button onClick={() => removePage(idx)} className="absolute -top-2 -right-2 bg-red-500 text-white rounded-full p-1.5 shadow-lg opacity-0 group-hover:opacity-100 transition-opacity">
                                 <Icons.X className="w-5 h-5" />
                               </button>
                               <div className="absolute bottom-2 left-2 bg-black/60 text-white text-[10px] font-black px-2 py-1 rounded">SAYFA {idx + 1}</div>
                            </div>
                          ))}
                          <button onClick={() => { startCamera(); setStep(2); }} className="h-48 border-2 border-dashed border-gray-200 rounded-xl flex flex-col items-center justify-center text-gray-400 hover:bg-gray-50 transition-all">
                             <Icons.Plus className="w-8 h-8 mb-2" />
                             <span className="text-xs font-black uppercase">SAYFA EKLE</span>
                          </button>
                       </div>
                       
                       <div className="pt-4 flex gap-3">
                          <button onClick={() => setStep(2)} className="flex-1 py-4 bg-gray-100 text-gray-700 rounded-xl font-black uppercase text-xs tracking-widest">GERİ DÖN</button>
                          <button onClick={handleGoToMailStep} className="flex-[2] py-4 bg-blue-600 text-white rounded-xl font-black uppercase text-xs tracking-widest shadow-lg">PDF OLUŞTUR VE DEVAM ET</button>
                       </div>
                    </div>
                 </div>
              </div>
            )}

            {/* STEP 4: EDITABLE MAIL DRAFT */}
            {step === 4 && (
              <div className="space-y-6 animate-in fade-in slide-in-from-right-4 duration-500">
                <div className="bg-white p-6 rounded-3xl shadow-xl border border-gray-100">
                   <div className="space-y-6">
                      <div className="bg-blue-50 p-4 rounded-xl border border-blue-100 space-y-1">
                        <div className="text-[10px] font-black text-blue-400 uppercase tracking-widest">ALICILAR</div>
                        <div className="text-blue-900 text-xs font-bold">airsupport@ogm.gov.tr (+3 Bilgi)</div>
                      </div>

                      <div className="space-y-2">
                        <label className="text-[10px] font-black text-gray-400 uppercase tracking-[0.2em]">MAİL İÇERİĞİNİ DÜZENLEYİN</label>
                        <textarea 
                          className="w-full h-64 p-6 bg-gray-50 border-2 border-gray-100 rounded-2xl text-xs font-medium text-gray-700 leading-relaxed outline-none focus:border-blue-300 transition-all font-mono"
                          value={mailBody}
                          onChange={(e) => setMailBody(e.target.value)}
                        />
                      </div>

                      <div className="bg-gray-50 p-4 rounded-xl flex items-center gap-3 border border-gray-100">
                        <Icons.FileUp className="w-6 h-6 text-green-600" />
                        <div className="text-xs font-black text-gray-600">{documentName.toUpperCase()}.pdf EKLENDİ</div>
                      </div>

                      <button 
                         onClick={handleFinalSend}
                         disabled={sending}
                         className="w-full py-6 bg-green-600 text-white rounded-2xl font-black uppercase tracking-[0.3em] shadow-2xl hover:bg-green-700 transition-all flex items-center justify-center gap-3 active:scale-95"
                       >
                         {sending ? <Icons.Loader className="w-6 h-6" /> : <Icons.Send className="w-6 h-6" />}
                         {sending ? 'GÖNDERİLİYOR...' : 'ONAYLA VE GÖNDER'}
                       </button>
                   </div>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    // --- Header ---
    const Header = ({ onAddDemand, showUploadButton, onUpload, onBackToLanding }) => (
      <header className="bg-white shadow-md p-4 flex justify-between items-center sticky top-0 z-50">
        <div className="flex items-center gap-3">
            <button onClick={onBackToLanding} className="flex items-center gap-2 p-1 hover:bg-gray-100 rounded-lg transition-colors">
              <img src="https://media4.giphy.com/media/v1.Y2lkPTc5MGI3NjExeTcwam1sYXJkazRoMTUxMWM1b2h6MTUwZDY1MXo5eThraGw4dG5kMCZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/n7frjzkahqcqyik0o3/giphy.gif" alt="Logo" className="h-12 w-auto mix-blend-multiply" />
              <h1 className="text-xl font-bold text-gray-800 hidden sm:block uppercase tracking-widest font-black">Task Line</h1>
            </button>
        </div>
        <div className="flex items-center gap-4">
          {showUploadButton && (
            <button onClick={onUpload} className="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-colors uppercase font-black text-sm tracking-widest shadow-md">
              <Icons.CloudUp className="w-5 h-5" /><span>Veri Yükle</span>
            </button>
          )}
          <button onClick={onAddDemand} className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors uppercase font-black text-sm tracking-widest shadow-md">
            <Icons.Plus className="w-5 h-5" /><span>Yeni Talep Oluştur</span>
          </button>
        </div>
      </header>
    );

    // --- FilterControls ---
    const FilterControls = ({ counts, activeStatus, onStatusChange, onExport }) => {
      const statusOrder = [DemandStatus.ISLEMDE, DemandStatus.TAMAMLANDI];
      const statusStyles = {
        [DemandStatus.ISLEMDE]: { active: 'bg-orange-500 text-white shadow-md', inactive: 'bg-white text-orange-600 border border-orange-200 hover:bg-orange-50' },
        [DemandStatus.TAMAMLANDI]: { active: 'bg-green-600 text-white shadow-md', inactive: 'bg-white text-green-600 border border-green-200 hover:bg-green-50' },
      };
      const statusDisplayNames = { [DemandStatus.ISLEMDE]: 'İŞLEMDEKİLER', [DemandStatus.TAMAMLANDI]: 'TAMAMLANANLAR' };
      
      return (
        <div className="pt-2">
          <div className="bg-white p-2 rounded-xl shadow-sm flex flex-col sm:flex-row items-center justify-between gap-3 border border-gray-100">
            <div className="flex-1 w-full grid grid-cols-2 gap-2">
              {statusOrder.map(status => {
                const isActive = activeStatus === status;
                const style = statusStyles[status];
                return (
                  <button key={status} onClick={() => onStatusChange(status)} className={`flex flex-col sm:flex-row items-center justify-center py-2 px-1 rounded-lg transition-all duration-200 text-xs sm:text-sm font-black uppercase tracking-widest ${isActive ? style.active : style.inactive}`}>
                    <span>{statusDisplayNames[status]}</span>
                    <span className={`ml-0 sm:ml-2 mt-1 sm:mt-0 px-1.5 py-0.5 rounded-full text-[10px] sm:text-xs ${isActive ? 'bg-white/30 text-white' : 'bg-gray-100 text-gray-600'}`}>{counts[status]}</span>
                  </button>
                );
              })}
            </div>
            <button onClick={onExport} className="w-full sm:w-auto flex-shrink-0 flex items-center justify-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 border border-gray-200 font-black text-xs transition-colors uppercase tracking-widest">
              <Icons.Download className="w-4 h-4" /><span>Excel</span>
            </button>
          </div>
        </div>
      );
    };

    // --- TypeFilterControls ---
    const TypeFilterControls = ({ filters, onSearch, assignedNames = [] }) => {
      const [internalFilters, setInternalFilters] = useState(filters);
      useEffect(() => { setInternalFilters(filters); }, [filters]);
      useEffect(() => {
        const handler = setTimeout(() => { 
            if (JSON.stringify(internalFilters) !== JSON.stringify(filters)) {
              onSearch(internalFilters);
            } 
        }, 300);
        return () => clearTimeout(handler);
      }, [internalFilters, filters, onSearch]);
      
      const handleTermChange = (e) => setInternalFilters(prev => ({ ...prev, term: e.target.value }));
      const handleTypeChange = (e) => setInternalFilters(prev => ({ ...prev, type: e.target.value }));
      const handleUnitChange = (e) => setInternalFilters(prev => ({ ...prev, requestingUnit: e.target.value }));
      const handleAssignedChange = (e) => setInternalFilters(prev => ({ ...prev, assignedTo: e.target.value }));

      return (
        <div className="pt-2">
          <div className="bg-white p-4 rounded-xl shadow-sm flex flex-col md:flex-row items-center gap-3 border border-gray-100">
            <div className="relative flex-grow w-full">
                <input type="search" value={internalFilters.term} onChange={handleTermChange} className="block w-full rounded-lg border border-gray-300 bg-gray-50 text-black p-2.5 focus:border-blue-500 focus:ring-blue-500 sm:text-sm uppercase font-black tracking-widest placeholder-gray-400" placeholder="Ara (EBYS No, Başlık, Açıklama...)" />
            </div>
            <select value={internalFilters.assignedTo} onChange={handleAssignedChange} className="block w-full md:w-auto p-2.5 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 uppercase font-black tracking-widest">
                <option value="all">Tüm İşi Alanlar</option>
                {assignedNames.map(name => <option key={name} value={name}>{name}</option>)}
            </select>
            <select value={internalFilters.type} onChange={handleTypeChange} className="block w-full md:w-auto p-2.5 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 uppercase font-black tracking-widest">
                <option value="all">Tüm Talep Türleri</option>
                {Object.values(DemandType).map(type => <option key={type} value={type}>{type}</option>)}
            </select>
            <select value={internalFilters.requestingUnit} onChange={handleUnitChange} className="block w-full md:w-auto p-2.5 bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 uppercase font-black tracking-widest">
                <option value="all">Tüm Birimler</option>
                {Object.values(RequestingUnit).map(unit => <option key={unit} value={unit}>{unit}</option>)}
            </select>
          </div>
        </div>
      );
    };

    // ==========================================
    // BÖLÜM 5: ANA UYGULAMA (APP)
    // ==========================================

    const App = () => {
      const [currentView, setCurrentView] = useState('landing');
      const [demands, setDemands] = useState([]);
      const [loading, setLoading] = useState(false);
      const [isAppVisible, setIsAppVisible] = useState(true);
      const [error, setError] = useState(null);
      const [processingDemands, setProcessingDemands] = useState(new Set());
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [demandToEdit, setDemandToEdit] = useState(null);
      const [activeStatus, setActiveStatus] = useState(DemandStatus.ISLEMDE);
      const [filtersByStatus, setFiltersByStatus] = useState({
        [DemandStatus.YENI]: { type: 'all', term: '', requestingUnit: 'all', assignedTo: 'all' },
        [DemandStatus.ISLEMDE]: { type: 'all', term: '', requestingUnit: 'all', assignedTo: 'all' },
        [DemandStatus.TAMAMLANDI]: { type: 'all', term: '', requestingUnit: 'all', assignedTo: 'all' },
      });
      const [isProgressModalOpen, setIsProgressModalOpen] = useState(false);
      const [selectedDemandForProgress, setSelectedDemandForProgress] = useState(null);
      const [deletionTarget, setDeletionTarget] = useState(null);
      const [toast, setToast] = useState(null);
      const [currentTime, setCurrentTime] = useState(new Date());
      const [storedAssignedNames, setStoredAssignedNames] = useState([]);
      
      const [isReportModalOpen, setIsReportModalOpen] = useState(false);
      const [reportStartDate, setReportStartDate] = useState('');
      const [reportEndDate, setReportEndDate] = useState('');

      const fileInputRef = useRef(null);
      
      const metaTag = document.querySelector('meta[name="google-script-url"]');
      const SCRIPT_URL = metaTag ? metaTag.getAttribute('content') : '';

      useEffect(() => {
          const timer = setInterval(() => {
              setCurrentTime(new Date());
          }, 30000); 
          return () => clearInterval(timer);
      }, []);

      const callApi = async (action, payload) => {
        if (!SCRIPT_URL) throw new Error("API URL bulunamadı");
        const res = await fetch(SCRIPT_URL, { method: 'POST', mode: 'cors', credentials: 'omit', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify({ action, payload }), redirect: 'follow' });
        if (!res.ok) throw new Error(`API hatası: ${res.status} ${res.statusText}`);
        const jsonResponse = await res.json();
        if (jsonResponse.status === 'error') throw new Error(`API Hatası: ${jsonResponse.message}`);
        return jsonResponse.data;
      };

      const api = {
        getDemands: () => callApi('getDemands'),
        saveDemand: (demand) => callApi('saveDemand', demand),
        deleteDemand: (id) => callApi('deleteDemand', id),
        batchSaveDemands: (demands) => callApi('batchSaveDemands', demands),
      };

      const showToast = (message, type = 'success') => setToast({ id: Date.now(), message, type });

      const refreshDemands = useCallback(async (isSilent = false) => {
        try {
          if (!isSilent && demands.length > 0) setLoading(true);
          setError(null);
          const data = await api.getDemands();
          
          // Persistence logic: Extract last assignedTo from history if exists
          const processedData = data.map(d => {
            if (d.assignedToHistory && Array.isArray(d.assignedToHistory) && d.assignedToHistory.length > 0) {
              d.assignedTo = d.assignedToHistory[d.assignedToHistory.length - 1].description;
            }
            return d;
          });

          setDemands(processedData);
          
          // Extract unique assigned names for filters
          const names = Array.from(new Set(processedData.flatMap(d => d.assignedTo ? d.assignedTo.split(',').map(s => s.trim()) : []).filter(n => !!n)));
          setStoredAssignedNames(names);
        } catch (err) {
          const errorMessage = err.message || 'Bilinmeyen bir hata oluştu.';
          setError(`Veriler yüklenemedi: ${errorMessage}`);
          console.error(err);
        } finally {
            setLoading(false);
            setIsAppVisible(true);
        }
      }, [demands]);

      useEffect(() => { refreshDemands(); }, []);
      
      const handleOpenAddModal = () => { setDemandToEdit(null); setIsModalOpen(true); };
      const handleOpenEditModal = (demand) => { setDemandToEdit(demand); setIsModalOpen(true); };
      const handleCloseModal = () => { setIsModalOpen(false); setDemandToEdit(null); };

      const handleSaveDemand = async (demandData, shouldKeepOpen = false) => {
        const originalDemands = [...demands];
        const isEditing = !!demandData.id;
        let optimisticDemand;
        const { checklistItems, addAssignedToList, ...restOfData } = demandData;

        if (isEditing) {
          const existingDemand = originalDemands.find(d => d.id === restOfData.id);
          if (!existingDemand) { showToast("Güncellenecek talep bulunamadı.", "error"); return; }
          optimisticDemand = { ...existingDemand, ...restOfData };
          if (checklistItems && checklistItems.length > 0) {
            optimisticDemand.progressHistory = [...optimisticDemand.progressHistory, ...checklistItems];
          }
        } else {
          const now = new Date();
          const progressHistory = checklistItems || [];
          optimisticDemand = { ...restOfData, id: Date.now(), createdAt: now.toISOString(), progressHistory, attachments: [] };
        }

        // Persistence logic for Column M (assignedToHistory)
        let aHistory = optimisticDemand.assignedToHistory || [];
        const currentAssignedValue = optimisticDemand.assignedTo || "";
        if (currentAssignedValue && (!aHistory.length || aHistory[aHistory.length - 1].description !== currentAssignedValue)) {
            aHistory.push({
                date: new Date().toISOString(),
                description: currentAssignedValue
            });
            optimisticDemand.assignedToHistory = aHistory;
        }

        setDemands(prev => isEditing ? prev.map(d => d.id === optimisticDemand.id ? optimisticDemand : d) : [...prev, optimisticDemand]);
        if (!shouldKeepOpen) {
            handleCloseModal();
        }
        setProcessingDemands(prev => new Set(prev).add(optimisticDemand.id));

        try {
          await api.saveDemand(optimisticDemand);
          showToast(isEditing ? 'Talep başarıyla güncellendi.' : 'Talep başarıyla oluşturuldu.');
          if (addAssignedToList && optimisticDemand.assignedTo) {
              const newNames = optimisticDemand.assignedTo.split(',').map(s => s.trim()).filter(s => s);
              setStoredAssignedNames(prev => Array.from(new Set([...prev, ...newNames])));
          }
        } catch (err) {
          showToast("Talep kaydedilemedi.", "error");
          setDemands(originalDemands);
        } finally {
          setProcessingDemands(prev => { const next = new Set(prev); next.delete(optimisticDemand.id); return next; });
        }
      };
      
      const requestDemandDeletion = (demandId) => setDeletionTarget({ type: 'demand', demandId });
      const requestProgressItemDeletion = (demandId, progressIndex, description) => setDeletionTarget({ type: 'progressItem', demandId, progressIndex, description });
      
      const handleConfirmDeletion = async () => {
        if (!deletionTarget) return;
        const originalDemands = [...demands];
        const { type, demandId, progressIndex, description } = deletionTarget;
        setDeletionTarget(null);

        if (type === 'demand') {
            setDemands(prev => prev.filter(d => d.id !== demandId));
            try { 
                const result = await api.deleteDemand(demandId);
